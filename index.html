<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zinrex Official</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 20px;
      background-color: rgba(0,0,0,0.5);
    }

    header h1 {
      margin: 0 0 10px 0;
      font-size: 2.2rem;
    }

    nav a {
      color: #ffd700;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    nav a:hover {
      color: #ff6347;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* 1080x1920 resim için ideal ayar */
    main img {
      width: 100%;
      max-width: 480px;      /* Telefon genişliği */
      height: auto;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    footer {
      text-align: center;
      padding: 10px;
      background-color: rgba(0,0,0,0.5);
    }

    /* Mobilde daha iyi görünüm */
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }

      main {
        padding: 10px;
      }

      main img {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to Zinrex</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="privacy.html">Privacy Policy</a> |
      <a href="child-safety.html">Child Safety</a> |
      <a href="delete-account.html">Delete Account</a> |
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <img 
      src="https://raw.githubusercontent.com/zinrexapp/zinrexapp/main/zinrexhome.jpg" 
      alt="Zinrex Home">
  </main>

  <footer>
    <p>&copy; 2026 Zinrex</p>
  </footer>

</body>
</html>
