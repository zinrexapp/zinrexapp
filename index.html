<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zinrex Official</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 20px;
      background-color: rgba(0,0,0,0.7);
      position: relative;
    }

    header h1 {
      margin: 0 0 10px 0;
      font-size: 2.2rem;
      color: #ffd700;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    nav a {
      color: #ffd700;
      text-decoration: none;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 5px;
      transition: background 0.3s, color 0.3s;
    }

    nav a:hover {
      background-color: #ff6347;
      color: #fff;
    }

    /* Aktif sayfa */
    nav a.active {
      background-color: #ffd700;
      color: #1f1c2c;
    }

    /* Hamburger menu (mobil) */
    .menu-toggle {
      display: none;
      position: absolute;
      right: 20px;
      top: 30px;
      cursor: pointer;
      font-size: 1.5rem;
      color: #ffd700;
    }

    @media (max-width: 768px) {
      nav {
        display: none;
        flex-direction: column;
        gap: 10px;
      }
      nav.show {
        display: flex;
      }
      .menu-toggle {
        display: block;
      }
    }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    main img {
      width: 100%;
      max-width: 480px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    footer {
      text-align: center;
      padding: 10px;
      background-color: rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="site-header"></div>

<script>
  fetch("header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("site-header").innerHTML = data;

      // Aktif sayfa
      const links = document.querySelectorAll('#site-header nav a');
      links.forEach(link => {
        if(link.href === window.location.href) {
          link.classList.add('active');
        }
      });

      // Hamburger toggle
      const nav = document.querySelector('#site-header nav');
      const toggleBtn = document.createElement('div');
      toggleBtn.classList.add('menu-toggle');
      toggleBtn.innerHTML = '&#9776;';
      toggleBtn.onclick = () => nav.classList.toggle('show');
      document.getElementById("site-header").prepend(toggleBtn);
    });
</script>

<main>
  <img 
    src="https://raw.githubusercontent.com/zinrexapp/zinrexapp/main/zinrexhomee.jpg" 
    alt="Zinrex Home">
</main>

<footer>
  <p>&copy; 2026 Zinrex</p>
</footer>

</body>
</html>
